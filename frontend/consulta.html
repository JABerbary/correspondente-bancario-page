<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Consulta de Simulações</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/consulta.css">
</head>

<body>

  <main class="consulta-page">

    <aside class="consulta-sidebar">
      <h4>Filtros</h4>

      <div class="mb-3">
        <label class="form-label">Nome do cliente</label>
        <input
          type="text"
          id="filterName"
          class="form-control"
          placeholder="Buscar por nome"
        >
      </div>

      <div class="mb-3">
        <label class="form-label">CPF</label>
        <input
          type="text"
          id="filterCpf"
          class="form-control"
          placeholder="Buscar por CPF"
        >
      </div>

      <button id="clearFilters" class="btn btn-orange w-100">
        Limpar filtros
      </button>

      <a href="./index.html" class="btn btn-outline-light w-100 mt-3">
        Voltar
      </a>
    </aside>

    <section class="consulta-content">
      <h2>Simulações recebidas</h2>

      <div class="table-responsive consulta-table-card">
        <table class="table table-dark table-hover align-middle">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Telefone</th>
              <th>CPF</th>
              <th>E-mail</th>
              <th>Linha de crédito</th>
              <th>Renda mensal</th>
              <th>Valor do imóvel</th>
              <th>Valor de entrada</th>
            </tr>
          </thead>

          <tbody id="simulationTableBody"></tbody>
        </table>
      </div>
    </section>

  </main>

  <script src="./js/consulta.js"></script>
</body>
</html>
